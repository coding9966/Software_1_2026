<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dog Names</title>
</head>
<body>

<script>
    const dogs = [];

    // Ask for 6 dog names
    for (let i = 0; i < 6; i++) {
        const name = prompt(`Enter name of dog ${i + 1}:`);
        dogs.push(name);
    }

    // Sort in reverse alphabetical order
    dogs.sort().reverse();

    // Print as <ul> list
    document.write("<ul>");
    for (let i = 0; i < dogs.length; i++) {
        document.write(`<li>${dogs[i]}</li>`);
    }
    document.write("</ul>");
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Duplicate Number Stop</title>
</head>
<body>

<script>
    const numbers = [];

    while (true) {
        const input = Number(prompt("Enter a number:"));

        // If the number was already entered → stop
        if (numbers.includes(input)) {
            console.log(`Number ${input} was already given. Stopping...`);
            break;
        }

        numbers.push(input);
    }

    // Sort ascending
    numbers.sort((a, b) => a - b);

    console.log("Numbers in ascending order:");
    for (let i = 0; i < numbers.length; i++) {
        console.log(numbers[i]);
    }
</script>

</body>
</html>
